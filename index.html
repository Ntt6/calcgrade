<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CalcGrade - 10 Subject Calculator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
body{background:#0f172a;color:#e2e8f0;padding:20px;min-height:100vh}
.container{max-width:500px;margin:0 auto}
h1{text-align:center;margin-bottom:8px;color:#38bdf8;font-size:28px}
.subtitle{text-align:center;color:#94a3b8;margin-bottom:24px;font-size:14px}
.card{background:#1e293b;border-radius:12px;padding:20px;margin-bottom:16px;border:1px solid #334155}
.subject{display:flex;gap:10px;margin-bottom:12px;align-items:center}
.subject input{flex:1;padding:12px;border-radius:8px;border:1px solid #475569;background:#0f172a;color:#e2e8f0;font-size:16px}
.subject input::placeholder{color:#64748b}
button{width:100%;padding:14px;border:none;border-radius:8px;background:#38bdf8;color:#0f172a;font-weight:700;font-size:16px;margin-top:8px}
button:active{transform:scale(.98)}
.result{text-align:center;font-size:20px;margin-top:16px;font-weight:600}
.pass{color:#4ade80}
.fail{color:#f87171}
.reset{background:#334155;color:#e2e8f0;margin-top:12px}
.footer{text-align:center;margin-top:24px;color:#64748b;font-size:12px}
</style>
</head>
<body>
<div class="container">
<h1>CalcGrade</h1>
<p class="subtitle">Enter marks for 10 subjects to calculate your average</p>
<div class="card">
<div id="subjects"></div>
<button onclick="calc()">Calculate Average</button>
<button class="reset" onclick="resetForm()">Reset</button>
